# 1. 开启 Vi 模式 (核心)
setw -g mode-keys vi

# 2. 开启鼠标支持
set -g mouse on

set -g renumber-windows on    # 自动重新编号窗口

# 3. 修正搜索快捷键：进入 Copy Mode 后按 / 或 ? 开启搜索
# tmux 默认在 vi 模式下已经支持 / 和 ? 搜索，且支持 n/N 跳转

# 4. 修正复制模式下的快捷键 (解决 send-shell 报错)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# 5. 开启搜索时忽略大小写 (正确指令)
# 注意：这需要较新版本的 tmux，如果依然报错可以注释掉此行
set -g status-keys vi

# --- Pane 切换 (Alt + 方向键) ---
# 负责在当前屏幕的各个分屏之间移动
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# --- Window 切换 (Alt + j/l) ---
# 负责在底部的不同窗口(标签页)间移动
bind -n M-j previous-window   # Alt + j 跳到左边窗口
bind -n M-l next-window       # Alt + l 跳到右边窗口

# --- Session 切换 (Alt + i/k) ---
# 负责在不同的项目(会话)之间切换
bind -n M-i switch-client -p  # Alt + i 跳到上一个会话 (Previous)
bind -n M-k switch-client -n  # Alt + k 跳到下一个会话 (Next)

# 按下 Alt + PageUp 直接进入复制模式并向上翻一页
bind -n M-PPage copy-mode -u

# 在复制模式（vi 模式）中，绑定 Alt + PageUp/PageDown
bind -T copy-mode-vi M-PPage send-keys -X page-up
bind -T copy-mode-vi M-NPage send-keys -X page-down

# --- 状态栏外观美化 ---

# 状态栏背景颜色
set -g status-bg black
set -g status-fg white

# 左侧显示 Session 名字 (配合 Alt+i/k)
set -g status-left-length 30
set -g status-left "#[fg=green,bold] Session: #S #[default] | "

# 中间窗口列表格式 (配合 Alt+j/l)
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=black,bg=cyan,bold] #I:#W #[default]"

# 右侧显示时间
set -g status-right "#[fg=yellow]%Y-%m-%d %H:%M "

# 刷新频率（每 5 秒刷新一次）
set -g status-interval 5

# 居中显示窗口列表
set -g status-justify centre

# --- 1. Alt + z 实现 Pane 缩放 (Zoom) ---
# 不需要前缀键，直接全屏/恢复当前面板
bind -n M-z resize-pane -Z

# --- 2. Alt + 数字 直接跳转 Pane ---
# 当你按下 Alt+1, Alt+2... 时，会直接跳到对应编号的面板
bind -n M-1 select-pane -t 1
bind -n M-2 select-pane -t 2
bind -n M-3 select-pane -t 3
bind -n M-4 select-pane -t 4
bind -n M-5 select-pane -t 5
bind -n M-6 select-pane -t 6
bind -n M-7 select-pane -t 7
bind -n M-8 select-pane -t 8
bind -n M-9 select-pane -t 9

# --- 3. 增强：显示编号的具体逻辑 ---
# 既然无法只按 Alt 显示，我们让面板编号在缩放或切换时显示更久
set -g display-panes-time 3000   # 编号显示 3 秒，方便你看着数字按 Alt+数字

# 让面板编号从 1 开始（默认是 0，1 更符合键盘直觉）
setw -g pane-base-index 1

# Alt + q 显示面板编号
bind -n M-q display-panes

# 开启面板标题栏 (显示在每个 Pane 的顶部)
set -g pane-border-status top

# 设置标题栏的格式
# #{pane_index}: 当前面板编号
# #{pane_title}: 你手动设置的标题
set -g pane-border-format " [ #P: #{pane_title} ] "

# 设置边框颜色（可选，让标题更醒目）
set -g pane-active-border-style "fg=cyan,bg=default"
set -g pane-border-style "fg=gray"

# 显示格式：[编号: 命令 @ 目录名]
set -g pane-border-format "#[bold] [ #P: #{pane_current_command} @ #{b:pane_current_path} ] #[default]"

# 4. 设置自动刷新频率（秒），确保命令切换时标题同步更新
set -g status-interval 1

# 将回滚缓冲区增加到 10000 行
set -g history-limit 10000

# --- 插件列表 ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum' # 自动保存插件

# --- 插件配置 ---
# 允许恢复程序内容（如 vim, python, man 等）
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-capture-pane-contents 'on'

# 开启自动保存功能（每 15 分钟自动保存一次）
set -g @continuum-restore 'on'

# 初始化 TPM (这行必须放在配置文件的最后)
run '~/.tmux/plugins/tpm/tpm'
